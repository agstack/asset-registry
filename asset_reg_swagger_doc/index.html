<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AgStack Asset Registry API</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist/swagger-ui.css" />
</head>
<body>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js"></script>
  <script>
    window.onload = function() {
      SwaggerUIBundle({
        url: "swagger.yaml",
        dom_id: "#swagger-ui",
        deepLinking: true,
        docExpansion: "none",
        syntaxHighlight: false // 🔥 This stops the crash on massive responses
      });
    };
  </script>
</body>
</html>
