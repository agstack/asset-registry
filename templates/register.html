<!DOCTYPE html>
<html lang="en">
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #e0eafc, #cfdef3);
            font-family: 'Segoe UI', sans-serif;
        }
        .card {
            max-width: 400px;
            margin: auto;
            margin-top: 80px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            background-color: #fff;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #007bff;
        }
        .form-icon {
            position: absolute;
            left: 15px;
            top: 10px;
            color: #007bff;
        }
        .form-group {
            position: relative;
        }
        .form-group input {
            padding-left: 35px;
        }
        .btn-primary {
            width: 100%;
            border-radius: 25px;
        }
        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #007bff;
        }
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1055;
        }
    </style>
</head>
<body>
    {% include 'navbar.html' %}
    <div class="card">
        <h2>Register</h2>
        <form id="registerForm">
            <div class="form-group mb-3">
                <i class="fa fa-user form-icon"></i>
                <input type="text" class="form-control" id="firstName" placeholder="First Name" required>
            </div>
            <div class="form-group mb-3">
                <i class="fa fa-user form-icon"></i>
                <input type="text" class="form-control" id="lastName" placeholder="Last Name" required>
            </div>
            <div class="form-group mb-3">
                <i class="fa fa-building form-icon"></i>
                <input type="text" class="form-control" id="companyName" placeholder="Company Name" required>
            </div>
            <div class="form-group mb-3">
                <i class="fa fa-envelope form-icon"></i>
                <input type="email" class="form-control" id="email" placeholder="Email" required>
            </div>
            <div class="form-group mb-3">
                <i class="fa fa-phone form-icon"></i>
                <input type="text" class="form-control" id="phone" placeholder="Phone Number" required>
            </div>
            <div class="form-group mb-3">
                <i class="fa fa-lock form-icon"></i>
                <input type="password" class="form-control" id="password" placeholder="Password" required>
            </div>
            <div class="form-group mb-3">
                <i class="fa fa-lock form-icon"></i>
                <input type="password" class="form-control" id="confirm_password" placeholder="Confirm Password" required>
            </div>
            <button type="submit" class="btn btn-primary">Sign Up</button>
            <div class="extra-links">
            <p>if you have an account? <a href="/login_page">Login here</a></p>
        </div>
        </form>
    </div>

    <!-- OTP Modal -->
    <div class="modal fade" id="otpModal" tabindex="-1" aria-labelledby="otpModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content p-3">
                <h5 class="modal-title mb-3" id="otpModalLabel">Enter OTP</h5>
                <input type="text" id="otpInput" class="form-control mb-3" placeholder="Enter OTP">
                <button class="btn btn-success w-100" id="verifyOtpBtn">Verify OTP</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container">
        <div id="toast" class="toast" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="3000">
            <div class="toast-header">
                <strong class="me-auto" id="toastTitle"></strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body" id="toastBody"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function showToast(title, message, type="success") {
            const toast = document.getElementById('toast');
            const toastTitle = document.getElementById('toastTitle');
            const toastBody = document.getElementById('toastBody');
            const bootstrapToast = new bootstrap.Toast(toast);

            toastTitle.textContent = title;
            toastBody.textContent = message;

            toast.classList.remove('bg-success', 'bg-danger', 'text-white');
            if (type === "success") {
                toast.classList.add('bg-success', 'text-white');
            } else {
                toast.classList.add('bg-danger', 'text-white');
            }

            bootstrapToast.show();
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const companyName = document.getElementById('companyName').value;
            const email = document.getElementById('email').value;
            const phone_number = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;

            try {
                const res = await fetch('http://localhost:5000/signup', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ firstName, lastName, companyName, email, phone_number, password, confirm_password })
                });

                const data = await res.json();
                console.log('Signup Response:', data);

                if (res.ok && data.status === "otp_sent") {
                    localStorage.setItem('public_key', data.public_key);
                    showToast("Success", data.message, "success");
                    const otpModal = new bootstrap.Modal(document.getElementById('otpModal'));
                    otpModal.show();
                } else {
                    showToast("Error", data.message || "Signup failed", "error");
                }
            } catch (err) {
                console.error(err);
                showToast("Error", "Failed to connect to server", "error");
            }
        });

        document.getElementById('verifyOtpBtn').addEventListener('click', async () => {
            const otp = document.getElementById('otpInput').value;
            const public_key = localStorage.getItem('public_key');

            try {
                const res = await fetch('http://localhost:5000/verify-otp', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ public_key, otp })
                });

                const data = await res.json();
                console.log('Verify OTP Response:', data);

                if (res.ok) {
                    showToast("Success", data.message || "OTP verified successfully", "success");
                    setTimeout(() => {
                        window.location.href = "/"; // redirect after success
                    }, 2000);
                } else {
                    showToast("Error", data.message || "OTP verification failed", "error");
                }
            } catch (err) {
                console.error(err);
                showToast("Error", "Failed to connect to server", "error");
            }
        });
    </script>
</body>
</html>
